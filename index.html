<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Scatterplot Maker</title>

    <!-- PyScript -->
    <link rel="stylesheet"
          href="https://pyscript.net/releases/2025.3.1/core.css">

    <script type="module"
            src="https://pyscript.net/releases/2025.3.1/core.js"></script>

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

</head>

<body>

    <h1>Scatterplot Maker</h1>

    <input id="x-values"
           type="text"
           placeholder="1,2,3,4">

    <input id="y-values"
           type="text"
           placeholder="2,4,1,5">

    <button id="plot-btn">
        Create Scatterplot
    </button>

    <div id="graph"></div>

    <py-script src="scatterplot_maker.py"></py-script>

</body>

</html>
