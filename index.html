<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Scatterplot Maker</title>

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Scatterplot Maker</h1>

        <label>X Values</label>
        <input
                type="text"
                id="x-values"
                placeholder="1,2,3,4,5"
        >

        <label>Y Values</label>
        <input
                type="text"
                id="y-values"
                placeholder="2,4,1,5,7"
        >

        <button onclick="makePlot()">
            Create Scatterplot
        </button>

        <div id="graph"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
